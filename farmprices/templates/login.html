<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{ shop_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-card input[type="text"],
    .login-card input[type="password"] {
      letter-spacing: normal;
      text-align: left;
      margin-bottom: 12px;
    }
    .login-card input[type="text"]:focus,
    .login-card input[type="password"]:focus {
      border-color: var(--green-light);
    }
    .login-role-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--green-pale);
      color: var(--green-dark);
      margin-top: 10px;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <h1>🌿 {{ shop_name }}</h1>
    <div class="login-sub">Staff Sign In</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}" style="margin-bottom:14px;text-align:left">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="text-align:left;margin-bottom:6px">
        <label style="font-size:0.82rem;font-weight:600;color:#555">Username</label>
      </div>
      <input
        type="text"
        name="username"
        placeholder="your username"
        autocomplete="username"
        autofocus
        required
        style="width:100%;padding:12px 16px;border:2px solid var(--grey-mid);border-radius:var(--radius);font-size:1rem;outline:none;margin-bottom:12px;font-family:inherit"
      >
      <div style="text-align:left;margin-bottom:6px">
        <label style="font-size:0.82rem;font-weight:600;color:#555">Password</label>
      </div>
      <input
        type="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      >
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:1rem;margin-top:4px">
        Sign In
      </button>
    </form>
    <p style="margin-top:16px;font-size:0.78rem;color:#bbb;text-align:center">
      Tenbury Farm Supplies · Internal Use Only
    </p>
  </div>
</body>
</html>
